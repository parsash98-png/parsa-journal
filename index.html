<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parsa Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff; --ink:#17181c; --gold:#c9a227; --gold-soft:#e9dcae;
      --gray:#6b6b6b; --hairline:#ececec; --card-bg:#faf8f2; --max:1100px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  header{display:flex;align-items:center;justify-content:space-between;padding:28px 24px;max-width:var(--max);margin:0 auto;}
  .logo{font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;}
  nav{display:flex;gap:32px;}
  nav a{font-size:15px;font-weight:500;color:var(--ink);padding-bottom:6px;border-bottom:2px solid transparent;}
  nav a.active{border-bottom-color:var(--gold);}
  nav a:hover{color:var(--gold);}
  .hero{padding:64px 24px 48px;max-width:var(--max);margin:0 auto;}
  .hero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,5vw,54px);line-height:1.12;letter-spacing:-0.01em;margin:0 0 20px;max-width:16ch;}
  .hero .highlight{display:inline-block;color:var(--gold);font-family:'Fraunces',serif;font-weight:600;font-size:clamp(18px,2.2vw,22px);margin:0 0 20px;}
  .hero p{font-size:16px;color:var(--gray);max-width:56ch;line-height:1.6;margin:0;}
  .section-label{text-transform:uppercase;letter-spacing:0.08em;font-size:12px;font-weight:600;color:var(--gold);margin:0 0 10px;}
  .section-title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,3vw,32px);margin:0 0 36px;}
  .posts{padding:24px 24px 80px;max-width:var(--max);margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
  .card{border:1px solid var(--hairline);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s ease, box-shadow .2s ease;}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.06);}
  .card .thumb{background:linear-gradient(135deg,var(--card-bg),var(--gold-soft));aspect-ratio:16/10;width:100%;background-size:cover;background-position:center;}
  .card .body{padding:22px 22px 26px;}
  .card .cat{text-transform:uppercase;letter-spacing:0.06em;font-size:11px;font-weight:600;color:var(--gold);margin:0 0 10px;}
  .card h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px;line-height:1.3;margin:0 0 10px;}
  .card p{font-size:14px;color:var(--gray);line-height:1.6;margin:0 0 16px;}
  .card .read{font-size:14px;font-weight:600;color:var(--gold);}
  .card .read:hover{opacity:0.75;}
  footer{border-top:2px solid var(--gold);padding:32px 24px;}
  .footer-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .footer-name{font-family:'Fraunces',serif;font-weight:600;font-size:16px;}
  .socials{display:flex;gap:18px;}
  .socials a{width:32px;height:32px;border:1px solid var(--gold-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px;font-weight:600;}
  .socials a:hover{background:var(--gold);color:#fff;}
    .copyright{font-size:13px;color:var(--gray);}
  @media (max-width:820px){.grid{grid-template-columns:1fr;}header{flex-direction:column;align-items:flex-start;gap:16px;}nav{gap:20px;flex-wrap:wrap;}}
</style>
  </head>
  <body>

    <header>
      <div class="logo">Parsa Journal</div>
      <nav>
        <a href="#" class="active">Home</a>
        <a href="#about">About</a>
        <a href="#blog">Blog</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <h1 id="hero-heading"></h1>
      <div class="highlight" id="hero-highlight"></div>
      <p id="hero-body"></p>
    </section>

    <section class="posts" id="blog">
      <div class="section-label">Latest Writing</div>
      <h2 class="section-title">Recent notes from the journal</h2>
    <div class="grid" id="post-grid"></div>
  </section>

  <footer id="contact">
      <div class="footer-inner">
        <div class="footer-name">Parsa Journal</div>
        <div class="socials">
          <a href="#" aria-label="Instagram">IG</a>
          <a href="#" aria-label="X / Twitter">X</a>
          <a href="#" aria-label="Email">@</a>
        </div>
        <div class="copyright">2026 Parsa Journal. All rights reserved.</div>
    </div>
  </footer>

    <script>
      fetch('/posts.json')
        .then(function(r) { return r.json(); })
      .then(function(data) {
                document.getElementById('hero-heading').textContent = data.hero_heading;
        document.getElementById('hero-highlight').textContent = data.hero_highlight;
        document.getElementById('hero-body').textContent = data.hero_body;

        var grid = document.getElementById('post-grid');
        var html = '';
        for (var i = 0; i < data.posts.length; i++) {
          var p = data.posts[i];
          html += '<article class="card">';
          html += '<div class="thumb" style="background-image:url(' + p.image + ')"></div>';
          html += '<div class="body">';
          html += '<div class="cat">' + p.category + '</div>';
          html += '<h3>' + p.title + '</h3>';
          html += '<p>' + p.excerpt + '</p>';
          html += '<a href="#" class="read">Read more</a>';
          html += '</div></article>';
        }
        grid.innerHTML = html;
      })
      .catch(function(err) { console.error('Could not load posts.json', err); });
  </script>

    </body>
    </html>
